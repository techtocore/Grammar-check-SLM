<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grammar Check SLM</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <img class="logo" src="icons/icon48.png" alt="" />
        <div class="titles">
          <h1>Grammar Check</h1>
          <p class="subtitle" id="header-status">Private · on-device AI</p>
        </div>
        <button
          class="icon-btn"
          id="open-options"
          type="button"
          title="Settings"
          aria-label="Settings"
        >
          ⚙
        </button>
      </header>

      <nav class="tabs" role="tablist">
        <button class="tab active" id="tab-editor" data-tab="editor" type="button" role="tab">
          Editor
        </button>
        <button class="tab" id="tab-controls" data-tab="controls" type="button" role="tab">
          Controls
        </button>
      </nav>

      <!-- ===== Editor ===== -->
      <section class="panel" id="panel-editor" role="tabpanel">
        <div class="editor">
          <textarea
            id="editor-input"
            class="editor-input"
            placeholder="Type or paste a sentence or paragraph to correct…"
            spellcheck="false"
            autocomplete="off"
          ></textarea>

          <div class="editor-bar">
            <span class="editor-hint" id="editor-hint"></span>
            <div class="editor-buttons">
              <button class="btn ghost" id="editor-clear" type="button">Clear</button>
              <button class="btn primary" id="editor-correct" type="button">Correct</button>
            </div>
          </div>

          <div class="result" id="editor-result" hidden>
            <div class="result-head">
              <span class="result-count" id="result-count"></span>
              <div class="result-actions">
                <button class="btn ghost small" id="editor-use" type="button" hidden>Use ↑</button>
                <button class="btn primary small" id="editor-copy" type="button">Copy</button>
              </div>
            </div>
            <div class="result-body" id="result-body"></div>
          </div>
        </div>
      </section>

      <!-- ===== Controls ===== -->
      <section class="panel" id="panel-controls" role="tabpanel" hidden>
        <div class="card status" id="status-card">
          <div class="status-row">
            <span class="dot" id="dot"></span>
            <span class="status-text" id="status-text">Checking…</span>
          </div>
          <div class="progress" id="progress-wrap" hidden>
            <div class="bar" id="bar"></div>
          </div>
          <div class="meta" id="meta"></div>
          <div class="error-detail" id="error-detail" hidden></div>
          <button class="retry-btn" id="retry" type="button" hidden>Retry</button>
        </div>

        <div class="card controls">
          <label class="row">
            <span>Enabled everywhere</span>
            <input type="checkbox" id="toggle-enabled" class="switch" />
          </label>
          <label class="row">
            <span id="site-label" class="ellipsis">This site</span>
            <input type="checkbox" id="toggle-site" class="switch" />
          </label>

          <div class="engine">
            <div class="engine-head">
              <span class="row-label">AI engine</span>
              <button class="engine-badge" id="engine-badge" type="button" hidden></button>
            </div>
            <div class="segmented" id="engine-seg" role="radiogroup" aria-label="AI engine">
              <button class="seg" data-backend="auto" type="button" role="radio">
                <span class="seg-emoji" aria-hidden="true">✨</span>Automatic
              </button>
              <button class="seg" data-backend="prompt" type="button" role="radio">
                <span class="seg-emoji" aria-hidden="true">⚡</span>Chrome&nbsp;AI
              </button>
              <button class="seg" data-backend="transformers" type="button" role="radio">
                <span class="seg-emoji" aria-hidden="true">💻</span>Local
              </button>
            </div>
            <p class="engine-desc" id="engine-desc"></p>
            <div class="engine-model" id="engine-model" hidden>
              <label class="row-label" id="model-label" for="model-select">Local model</label>
              <select id="model-select" class="select"></select>
            </div>
          </div>
        </div>

        <footer class="footer">
          <button class="link-btn" id="open-options-2" type="button">⚙ All settings</button>
          <a
            class="link-btn"
            href="https://github.com/techtocore/Grammar-check-SLM"
            target="_blank"
            rel="noreferrer"
            >GitHub ↗</a
          >
        </footer>
      </section>
    </div>
  </body>
</html>
